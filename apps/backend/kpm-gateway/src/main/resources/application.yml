server:
  port: ${PORT:8080}

spring:
  application:
    name: kpm-gateway
  config:
    import: optional:nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension:yaml}
  cloud:
    nacos:
      server-addr: ${KPM_NACOS_ADDR:127.0.0.1:8848}
      config:
        enabled: ${KPM_NACOS_CONFIG_ENABLED:${KPM_NACOS_ENABLED:false}}
        namespace: ${KPM_NACOS_NAMESPACE:public}
        group: ${KPM_NACOS_CONFIG_GROUP:DEFAULT_GROUP}
        file-extension: yaml
      discovery:
        enabled: ${KPM_NACOS_ENABLED:false}
        namespace: ${KPM_NACOS_NAMESPACE:public}
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                exposedHeaders:
                  - Authorization
                  - X-KPM-Refresh-Token
                allowCredentials: false
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Access-Control-Allow-Methods Access-Control-Allow-Headers Access-Control-Expose-Headers RETAIN_FIRST
          routes:
            - id: iam
              uri: ${KPM_ROUTE_IAM_URI:lb://kpm-iam-service}
              predicates:
                - Path=/api/iam/**
            - id: resources
              uri: ${KPM_ROUTE_RESOURCES_URI:lb://kpm-resource-service}
              predicates:
                - Path=/api/resources/**
            - id: projects
              uri: ${KPM_ROUTE_PROJECTS_URI:lb://kpm-project-service}
              predicates:
                - Path=/api/projects/**
            - id: customers
              uri: ${KPM_ROUTE_CUSTOMERS_URI:lb://kpm-customer-service}
              predicates:
                - Path=/api/customers/**,/api/customer-portal/**,/api/knowledge/**
            - id: tasks
              uri: ${KPM_ROUTE_TASKS_URI:lb://kpm-task-service}
              predicates:
                - Path=/api/tasks/**
            - id: orders
              uri: ${KPM_ROUTE_ORDERS_URI:lb://kpm-order-service}
              predicates:
                - Path=/api/orders/**
            - id: files
              uri: ${KPM_ROUTE_FILES_URI:lb://kpm-file-service}
              predicates:
                - Path=/api/files/**
            - id: analytics
              uri: ${KPM_ROUTE_ANALYTICS_URI:lb://kpm-analytics-service}
              predicates:
                - Path=/api/analytics/**
            - id: integrations
              uri: ${KPM_ROUTE_INTEGRATIONS_URI:lb://kpm-integration-service}
              predicates:
                - Path=/api/integrations/**
            - id: notifications
              uri: ${KPM_ROUTE_NOTIFICATIONS_URI:lb://kpm-notification-service}
              predicates:
                - Path=/api/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

kpm:
  iam:
    uri: ${KPM_IAM_URI:http://localhost:8101}
  auth:
    enabled: ${KPM_AUTH_ENABLED:true}
    rbac-enabled: ${KPM_RBAC_ENABLED:true}
    token-secret: ${KPM_AUTH_TOKEN_SECRET:kpm-local-dev-secret-change-me}
    token-ttl-seconds: ${KPM_AUTH_TOKEN_TTL_SECONDS:7200}
